<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ticker — Copa Uruguaya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold: #e8c87a;
            --bg0: #0a0a0a;
            --bg2: #1a1208;
            --brown: #3a2a1a;
            --text: #e8e0d0;
            --green: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg0);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }

        h1,
        h2 {
            font-family: 'Cinzel';
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section {
            background: var(--bg2);
            border: 1px solid var(--brown);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--brown);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            cursor: pointer;
            accent-color: var(--gold);
        }

        .tag {
            font-size: 10px;
            background: var(--brown);
            color: var(--gold);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .btn-small {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cinzel';
            font-size: 11px;
        }

        .btn-update {
            background: var(--gold);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-family: 'Cinzel';
            font-weight: 700;
            cursor: pointer;
            position: sticky;
            bottom: 15px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.8);
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-update:active {
            transform: scale(0.96);
            background: var(--text);
        }
    </style>
</head>

<body>

    <h1>Control de Ticker</h1>
    <p style="font-size:12px; color:#654; margin-bottom:20px;">Copa Uruguaya 2026 — Modo Seguro</p>

    <div class="section">
        <div class="header-flex">
            <h2>Partidos</h2>
            <button class="btn-small" id="btnSelectAll">Marcar Todos</button>
        </div>
        <div id="list-partidos">Cargando...</div>
    </div>

    <div class="section">
        <div class="header-flex">
            <h2>Grupos en Tabla</h2>
        </div>
        <div id="list-tablas">Cargando...</div>
    </div>

    <button class="btn-update" id="btnActualizar">🚀 ACTUALIZAR EN STREAM</button>

    <script>
        const WS_SERVER = 'https://aldeanooscar.squareweb.app';
        const TOKEN_KEY = 'aua_admin_token_draft';
        let dbGlobal = null;

        async function init() {
            try {
                const res = await fetch(WS_SERVER + '/api/torneos/1v1_copa_uruguaya_2026');
                dbGlobal = await res.json();
                renderAdmin();
            } catch (e) { console.error("Error:", e); }
        }

        function renderAdmin() {
            const pDiv = document.getElementById('list-partidos');
            const tDiv = document.getElementById('list-tablas');
            pDiv.innerHTML = ""; tDiv.innerHTML = "";

            // 1. Partidos con resultado
            dbGlobal.rondas_grupos.forEach(g => {
                g.partidos.forEach(r => r.partidos.forEach(p => {
                    if (p.resultado) {
                        const id1 = p.jugador1Id; const id2 = p.jugador2Id;
                        const s1 = p.resultado[id1]; const s2 = p.resultado[id2];
                        pDiv.innerHTML += `
                <div class="item-row">
                    <input type="checkbox" class="chk-res" 
                        data-p1="${p.jugador1Nick}" data-p2="${p.jugador2Nick}" 
                        data-s1="${s1}" data-s2="${s2}" data-id1="${id1}" data-id2="${id2}" data-grupo="${g.grupo}">
                    <span class="tag">G${g.grupo}</span>
                    <span style="font-size:14px">${p.jugador1Nick} <b>${s1}-${s2}</b> ${p.jugador2Nick}</span>
                </div>`;
                    }
                }));
            });

            // 2. Grupos (Marcados por defecto)
            dbGlobal.grupos.forEach(g => {
                tDiv.innerHTML += `
        <div class="item-row">
            <input type="checkbox" class="chk-tab" value="${g.nombre}" checked>
            <span>${g.nombre}</span>
        </div>`;
            });
        }

        // Botón "Marcar Todos"
        document.getElementById('btnSelectAll').addEventListener('click', () => {
            const checks = document.querySelectorAll('.chk-res');
            const algunoSinCheck = Array.from(checks).some(c => !c.checked);
            checks.forEach(c => c.checked = algunoSinCheck);
            document.getElementById('btnSelectAll').innerText = algunoSinCheck ? "Desmarcar Todos" : "Marcar Todos";
        });

        // Lógica de cálculo (idéntica a calculoTablaCopa.js)
        function calcularSimulacion(partidos) {
            const tablas = {};
            dbGlobal.grupos.forEach(g => {
                tablas[g.nombre] = {};
                g.jugadores.forEach(j => {
                    tablas[g.nombre][j.id] = { nick: j.nick, pj: 0, pg: 0, pp: 0, sf: 0, sc: 0, pts: 0 };
                });
            });

            partidos.forEach(p => {
                const gKey = "Grupo " + p.grupo;
                const stats = tablas[gKey];
                if (stats && stats[p.id1] && stats[p.id2]) {
                    const s1 = parseInt(p.s1); const s2 = parseInt(p.s2);
                    stats[p.id1].pj++; stats[p.id2].pj++;
                    stats[p.id1].sf += s1; stats[p.id1].sc += s2;
                    stats[p.id2].sf += s2; stats[p.id2].sc += s1;
                    if (s1 === 2 && s2 === 0) { stats[p.id1].pg++; stats[p.id1].pts += 2; stats[p.id2].pp++; }
                    else if (s1 === 2 && s2 === 1) { stats[p.id1].pg++; stats[p.id1].pts += 2; stats[p.id2].pp++; stats[p.id2].pts += 1; }
                    else if (s2 === 2 && s1 === 0) { stats[p.id2].pg++; stats[p.id2].pts += 2; stats[p.id1].pp++; }
                    else if (s2 === 2 && s1 === 1) { stats[p.id2].pg++; stats[p.id2].pts += 2; stats[p.id1].pp++; stats[p.id1].pts += 1; }
                }
            });

            const final = {};
            Object.keys(tablas).forEach(n => {
                final[n] = Object.values(tablas[n]).sort((a, b) => (b.pts - a.pts) || ((b.sf - b.sc) - (a.sf - a.sc)));
            });
            return final;
        }

        // Enviar al servidor
        document.getElementById('btnActualizar').addEventListener('click', async () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return alert("Inicia sesión en el Admin de Drafts primero");

            const partidosElegidos = Array.from(document.querySelectorAll('.chk-res:checked')).map(cb => ({ ...cb.dataset }));
            const gruposVisibles = Array.from(document.querySelectorAll('.chk-tab:checked')).map(cb => cb.value);

            const tablasCalculadas = calcularSimulacion(partidosElegidos);

            try {
                const r = await fetch(WS_SERVER + '/overlay/ticker', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ resultados: partidosElegidos, tablas: tablasCalculadas, gruposVisibles })
                });
                if (r.ok) alert("¡Ticker sincronizado!");
                else alert("Error 401: Sesión expirada");
            } catch (e) { alert("Error de conexión"); }
        });

        init();
    </script>
</body>

</html>
