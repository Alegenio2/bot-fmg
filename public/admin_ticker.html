<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ticker — Copa Uruguaya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold:#e8c87a; --bg0:#0a0a0a; --bg2:#1a1208; --brown:#3a2a1a; --text:#e8e0d0; }
        body { font-family:'Inter', sans-serif; background:var(--bg0); color:var(--text); padding:20px; margin:0; }
        h1, h2 { font-family:'Cinzel'; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:15px; }
        .section { background:var(--bg2); border:1px solid var(--brown); border-radius:12px; padding:15px; margin-bottom:25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .item-row { display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--brown); transition: background 0.2s; }
        .item-row:hover { background: rgba(232,200,122,0.05); }
        .item-row input[type="checkbox"] { transform: scale(1.4); cursor: pointer; }
        .tag { font-size:10px; background:var(--brown); color:var(--gold); padding:2px 6px; border-radius:4px; font-weight:700; }
        .btn-update { 
            background:var(--gold); color:black; border:none; padding:18px; width:100%; border-radius:10px; 
            font-family:'Cinzel'; font-weight:700; cursor:pointer; position:sticky; bottom:15px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8); font-size: 16px;
        }
        .btn-update:active { transform: scale(0.98); }
    </style>
</head>
<body>

<h1>Control de Resultados</h1>

<div class="section">
    <h2>Resultados a Mostrar</h2>
    <div id="list-partidos">Cargando partidos...</div>
</div>

<div class="section">
    <h2>Tablas a Mostrar</h2>
    <div id="list-tablas">Cargando grupos...</div>
</div>

<button class="btn-update" id="btnActualizar">↺ ACTUALIZAR TICKER (MODO SEGURO)</button>

<script>
const WS_SERVER = 'https://aldeanooscar.squareweb.app';
const TOKEN_KEY = 'aua_admin_token_draft'; 

let dbGlobal = null;

async function init() {
    try {
        const [resP, resT] = await Promise.all([
            fetch(WS_SERVER + '/api/torneos/1v1_copa_uruguaya_2026'),
            fetch(WS_SERVER + '/api/torneos/tabla_posiciones')
        ]);
        dbGlobal = await resP.json();
        renderAdmin();
    } catch(e) { console.error("Error cargando datos:", e); }
}

function renderAdmin() {
    const pDiv = document.getElementById('list-partidos');
    const tDiv = document.getElementById('list-tablas');
    pDiv.innerHTML = ""; tDiv.innerHTML = "";

    // 1. Listar partidos con resultado
    dbGlobal.rondas_grupos.forEach(g => {
        g.partidos.forEach(r => r.partidos.forEach(p => {
            if(p.resultado && p.jugador1Id) {
                const id1 = p.jugador1Id; const id2 = p.jugador2Id;
                const score1 = p.resultado[id1]; const score2 = p.resultado[id2];
                
                pDiv.innerHTML += `
                <div class="item-row">
                    <input type="checkbox" class="chk-res" 
                        data-p1="${p.jugador1Nick}" data-p2="${p.jugador2Nick}" 
                        data-s1="${score1}" data-s2="${score2}"
                        data-id1="${id1}" data-id2="${id2}" data-grupo="${g.grupo}">
                    <span class="tag">GRUPO ${g.grupo}</span>
                    <span>${p.jugador1Nick} ${score1} - ${score2} ${p.jugador2Nick}</span>
                </div>`;
            }
        }));
    });

    // 2. Listar grupos para tablas
    dbGlobal.grupos.forEach(g => {
        tDiv.innerHTML += `
        <div class="item-row">
            <input type="checkbox" class="chk-tab" value="${g.nombre}">
            <span>${g.nombre}</span>
        </div>`;
    });
}

// TU LÓGICA DE CALCULO (Adaptada para el navegador)
function calcularTablaSimulada(partidosElegidos) {
    const tablas = {};
    
    // Inicializar con la estructura original
    dbGlobal.grupos.forEach(g => {
        tablas[g.nombre] = {};
        g.jugadores.forEach(j => {
            tablas[g.nombre][j.id] = { nick: j.nick, pj: 0, pg: 0, pp: 0, sf: 0, sc: 0, pts: 0 };
        });
    });

    // Procesar solo lo marcado en el Admin
    partidosElegidos.forEach(p => {
        const grupoKey = "Grupo " + p.grupo;
        const stats = tablas[grupoKey];
        if (stats && stats[p.id1] && stats[p.id2]) {
            const s1 = parseInt(p.s1); const s2 = parseInt(p.s2);
            stats[p.id1].pj++; stats[p.id2].pj++;
            stats[p.id1].sf += s1; stats[p.id1].sc += s2;
            stats[p.id2].sf += s2; stats[p.id2].sc += s1;

            if (s1 === 2 && s2 === 0) { stats[p.id1].pg++; stats[p.id1].pts += 2; stats[p.id2].pp++; }
            else if (s1 === 2 && s2 === 1) { stats[p.id1].pg++; stats[p.id1].pts += 2; stats[p.id2].pp++; stats[p.id2].pts += 1; }
            else if (s2 === 2 && s1 === 0) { stats[p.id2].pg++; stats[p.id2].pts += 2; stats[p.id1].pp++; }
            else if (s2 === 2 && s1 === 1) { stats[p.id2].pg++; stats[p.id2].pts += 2; stats[p.id1].pp++; stats[p.id1].pts += 1; }
        }
    });

    // Ordenar
    const resultadoFinal = {};
    Object.keys(tablas).forEach(gn => {
        resultadoFinal[gn] = Object.values(tablas[gn]).sort((a,b) => {
            if (b.pts !== a.pts) return b.pts - a.pts;
            return (b.sf - b.sc) - (a.sf - a.sc);
        });
    });
    return resultadoFinal;
}

document.getElementById('btnActualizar').addEventListener('click', async () => {
    const chks = document.querySelectorAll('.chk-res:checked');
    const partidosParaSimular = Array.from(chks).map(cb => ({...cb.dataset}));
    const gruposParaMostrar = Array.from(document.querySelectorAll('.chk-tab:checked')).map(cb => cb.value);

    const tablaCalculada = calcularTablaSimulada(partidosParaSimular);
    
    const state = {
        resultados: partidosParaSimular, // Los partidos que elegiste mostrar
        tablas: tablaCalculada,          // La tabla con los puntos calculados
        gruposVisibles: gruposParaMostrar,
        ts: Date.now()
    };

    try {
        const r = await fetch(WS_SERVER + '/overlay/ticker', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) },
            body: JSON.stringify(state)
        });
        if(r.ok) alert("¡Ticker Actualizado!");
    } catch(e) { alert("Error al enviar al servidor"); }
});

init();
</script>
</body>
</html>
