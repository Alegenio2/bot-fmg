<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Overlay Resultados — Copa Uruguaya 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Inter',sans-serif}

/* Ticker horizontal en el pie */
#ticker-container {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 90px;
  background: linear-gradient(to top, rgba(8, 5, 2, 0.95) 0%, rgba(8, 5, 2, 0.85) 50%, rgba(8, 5, 2, 0.4) 80%, transparent 100%);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.ticker-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  color: #806040;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 6px 20px 4px;
}

.ticker-track {
  display: flex;
  gap: 12px;
  padding: 0 20px 10px;
  will-change: transform;
}

.ticker-track.animate {
  animation: scroll 80s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Tarjeta de resultado */
.ticker-card {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(232, 200, 122, 0.08);
  border: 0.5px solid rgba(232, 200, 122, 0.2);
  border-radius: 6px;
  padding: 8px 14px;
  min-width: 200px;
  animation: fadeIn 0.4s ease both;
}

.ticker-player {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 85px;
}

.ticker-player.right { text-align: right; }

.ticker-nick {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 85px;
}

.ticker-score {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 50px;
  justify-content: center;
}

.ticker-num {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
  color: #e8c87a;
  line-height: 1;
}

.ticker-num.win { color: #4ade80; text-shadow: 0 0 8px rgba(74, 222, 128, 0.3); }
.ticker-num.win::after { content: ' ★'; font-size: 10px; }
.ticker-num.lose { color: #f87171; opacity: 0.7; }

.ticker-vs { font-family: 'Cinzel', serif; font-size: 12px; color: #554433; }

/* Tabla de Grupos Overlay */
#groups-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(8, 5, 2, 0.98);
  border: 2px solid #e8c87a;
  padding: 30px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
  box-shadow: 0 0 50px rgba(0,0,0,0.9);
  max-width: 90%;
  max-height: 80%;
  overflow-y: auto;
}

.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.group-table {
  border-collapse: collapse;
  width: 100%;
  background: rgba(232, 200, 122, 0.05);
}

.group-table th {
  font-family: 'Cinzel', serif;
  background: #e8c87a;
  color: #000;
  padding: 8px;
  font-size: 14px;
}

.group-table td {
  padding: 8px;
  border-bottom: 1px solid rgba(232, 200, 122, 0.2);
  color: #fff;
  font-size: 13px;
}

.pos-pts { text-align: center; font-weight: bold; color: #4ade80; width: 40px; }

/* Indicador de estado para el Streamer */
#status-indicator {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 12px;
  color: #555;
  background: rgba(0,0,0,0.5);
  padding: 5px 10px;
  border-radius: 4px;
  font-family: monospace;
  z-index: 2000;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="status-indicator">MODO ESTATICO - PULSA 'L' PARA ACTUALIZAR</div>

<div id="groups-overlay">
  <h2 style="font-family:'Cinzel'; color:#e8c87a; text-align:center; margin-bottom:20px; letter-spacing: 4px;">COPA URUGUAYA 2026 - POSICIONES</h2>
  <div class="groups-grid" id="groups-grid"></div>
</div>

<div id="ticker-container">
  <div class="ticker-label">RESULTADOS Y PRÓXIMOS PARTIDOS</div>
  <div class="ticker-track" id="ticker-track"></div>
</div>

<script>
let isLocked = false;
let tournamentDataCache = null;

async function loadTickerData() {
  if (isLocked) return; // Si está bloqueado, no permite la actualización automática

  try {
    const response = await fetch('https://aldeanooscar.squareweb.app/api/torneos/1v1_copa_uruguaya_2026');
    tournamentDataCache = await response.json();
    
    renderTicker(tournamentDataCache);
    renderGroups(tournamentDataCache);
    
    isLocked = true; // Bloqueamos tras la carga exitosa
    updateStatusLabel("DATOS CONGELADOS (Pulsa L para refrescar)", "#f87171");
  } catch (error) {
    console.error('Error cargando datos:', error);
  }
}

function updateStatusLabel(text, color) {
  const el = document.getElementById('status-indicator');
  el.innerText = text;
  el.style.color = color;
}

function renderTicker(data) {
  const track = document.getElementById('ticker-track');
  let html = '';
  const resultados = [];
  const coordinados = [];
  
  if (data.rondas_grupos) {
    data.rondas_grupos.forEach(grupoData => {
      if (grupoData.partidos) {
        grupoData.partidos.forEach(rondaObj => {
          if (rondaObj.partidos) {
            rondaObj.partidos.forEach(partido => {
              if (partido.resultado) {
                const score1 = partido.resultado[partido.jugador1Id];
                const score2 = partido.resultado[partido.jugador2Id];
                resultados.push({ p1: partido.jugador1Nick, p2: partido.jugador2Nick, s1: score1, s2: score2 });
              } else if (partido.coordinadoPor) {
                coordinados.push({ p1: partido.jugador1Nick, p2: partido.jugador2Nick, hora: partido.horario, dia: partido.diaSemana });
              }
            });
          }
        });
      }
    });
  }

  // HTML para Resultados
  resultados.forEach(r => {
    html += `
      <div class="ticker-card">
        <div class="ticker-player"><span class="ticker-nick">${truncateName(r.p1, 10)}</span></div>
        <div class="ticker-score">
          <span class="ticker-num ${r.s1 > r.s2 ? 'win' : 'lose'}">${r.s1}</span>
          <span class="ticker-vs">-</span>
          <span class="ticker-num ${r.s2 > r.s1 ? 'win' : 'lose'}">${r.s2}</span>
        </div>
        <div class="ticker-player right"><span class="ticker-nick">${truncateName(r.p2, 10)}</span></div>
      </div>`;
  });

  // HTML para Coordinados
  coordinados.forEach(c => {
    html += `
      <div class="ticker-card">
        <div class="ticker-player"><span class="ticker-nick">${truncateName(c.p1, 10)}</span></div>
        <div style="color:#5090b0; font-size:11px; padding: 0 10px;">${c.dia ? c.dia.substring(0,3) : ''} ${c.hora || ''}</div>
        <div class="ticker-player right"><span class="ticker-nick">${truncateName(c.p2, 10)}</span></div>
      </div>`;
  });

  track.innerHTML = html + html; 
  track.classList.add('animate');
}

function renderGroups(data) {
  const grid = document.getElementById('groups-grid');
  let html = '';
  if (!data.rondas_grupos) return;

  data.rondas_grupos.forEach(g => {
    html += `
      <table class="group-table">
        <thead><tr><th colspan="3">GRUPO ${g.grupo}</th></tr></thead>
        <tbody>`;
    // Aquí se asume que 'jugadores' viene en la data del grupo
    const jugadores = g.jugadores || [];
    jugadores.forEach(j => {
      html += `<tr><td>${j.nick}</td><td class="pos-pts">${j.partidosJugados || 0}J</td><td class="pos-pts">${j.puntos || 0} pts</td></tr>`;
    });
    html += `</tbody></table>`;
  });
  grid.innerHTML = html;
}

function truncateName(name, max) {
  return name && name.length > max ? name.substring(0, max-1) + '…' : name;
}

// Atajos de teclado
window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'l') { // L = Liberar/Actualizar
    isLocked = false;
    updateStatusLabel("ACTUALIZANDO...", "#4ade80");
    loadTickerData();
  }
  if (key === 'g') { // G = Grupos
    const overlay = document.getElementById('groups-overlay');
    overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
  }
});

// Carga inicial
loadTickerData();
</script>
</body>
</html>
