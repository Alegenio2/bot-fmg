<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Ticker Copa Uruguaya 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Inter',sans-serif}
  #ticker-container {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 100px;
    background: linear-gradient(to top, rgba(8,5,2,0.95), rgba(8,5,2,0.6));
    display: flex; flex-direction: column; overflow: hidden;
    border-top: 2px solid #e8c87a;
  }
  .ticker-track { display: flex; gap: 40px; align-items: center; padding: 10px 20px; white-space: nowrap; }
  .animate { animation: scroll 180s linear infinite; }
  @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  
  .section-tag { color: #e8c87a; font-family: 'Cinzel'; font-weight: 700; border-left: 3px solid #e8c87a; padding-left: 10px; margin-right: 10px; }
  .ticker-card { flex-shrink: 0; display: flex; align-items: center; gap: 15px; background: rgba(232,200,122,0.1); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(232,200,122,0.2); }
  .ticker-nick { font-family: 'Cinzel'; color: #fff; font-size: 16px; }
  .ticker-score { font-size: 24px; font-weight: 900; color: #e8c87a; }
  .ticker-time { font-size: 15px; color: #5090b0; font-weight: 700; background: rgba(80,144,176,0.1); padding: 4px 8px; border-radius: 4px; }
  #status { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.7); color: #fff; padding: 5px 10px; font-size: 12px; border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>
<div id="status">CARGANDO...</div>
<div id="ticker-container">
  <div class="ticker-track" id="track"></div>
</div>

<script>
let locked = false;

async function fetchData() {
  if(locked) return;
  try {
    const [resP, resT] = await Promise.all([
      fetch('https://aldeanooscar.squareweb.app/api/torneos/1v1_copa_uruguaya_2026'),
      fetch('https://aldeanooscar.squareweb.app/api/torneos/tabla_posiciones')
    ]);
    const partidos = await resP.json();
    const tablas = await resT.json();
    render(partidos, tablas);
    locked = true;
    document.getElementById('status').innerText = "CONGELADO (Pulsa L)";
  } catch(e) { console.error(e); }
}

function render(partidos, tablas) {
  const track = document.getElementById('track');
  let html = '<span class="section-tag">RESULTADOS</span>';
  
  // Procesar Partidos Coordinados (Ordenados por fecha)
  const coord = [];
  partidos.rondas_grupos.forEach(g => g.partidos.forEach(r => r.partidos.forEach(p => {
    if(!p.resultado && p.fecha && p.horario) coord.push(p);
  })));
  coord.sort((a,b) => new Date(a.fecha+'T'+a.horario) - new Date(b.fecha+'T'+b.horario));

  // HTML Resultados y Próximos...
  coord.forEach(p => {
    html += `<div class="ticker-card"><span class="ticker-nick">${p.jugador1Nick}</span><span class="ticker-time">${p.diaSemana.substring(0,3)} ${p.horario}</span><span class="ticker-nick">${p.jugador2Nick}</span></div>`;
  });

  // SECCIÓN TABLAS (Lo más importante)
  Object.entries(tablas).forEach(([grupo, jugadores]) => {
    html += `<span class="section-tag">${grupo.toUpperCase()}</span>`;
    jugadores.forEach(j => {
      html += `<div class="ticker-card"><span class="ticker-nick">${j.nick}</span><span class="ticker-score">${j.pts} <small style="font-size:12px">PTS</small></span></div>`;
    });
  });

  track.innerHTML = html + html;
  track.classList.add('animate');
}

window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'l'){ locked = false; fetchData(); }});
fetchData();
</script>
</body>
</html>
